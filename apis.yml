aid: council-on-environmental-quality
name: Council on Environmental Quality
x-type: government
description: >-
  The Council on Environmental Quality (CEQ) is an office within the Executive
  Office of the President of the United States that coordinates federal
  environmental policy, advises the President on environmental and natural
  resource policies, and oversees the implementation of the National
  Environmental Policy Act (NEPA). CEQ does not publish a public developer
  API. Federal NEPA documents and related environmental data are surfaced
  through partner federal agencies and platforms (NEPAtool, the Federal
  Permitting Dashboard, regulations.gov, EPA EJScreen, and the Climate and
  Economic Justice Screening Tool).
